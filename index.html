function salaryForDateFromHistory(dateStr, history, fallbackSalary){
  const hist=[...(history||[])].filter(h=>h!=null&&String(h.date||"").length>=8).sort((a,b)=>String(a.date).localeCompare(String(b.date)));
  if(!hist.length) return Number(fallbackSalary)||0;
  let sal=Number(hist[0].salary);
  const d=String(dateStr);
  for(const h of hist){ if(String(h.date)<=d) sal=Number(h.salary); }
  return sal;
}

function reconcile401kRowsFromHistory(){
  const pct=S.settings.k401_pct/100, em=S.settings.employer_match_pct/100;
  for(const r of S.k401.contributions){
    if(r.opening) continue;
    const salTrue=salaryForDateFromHistory(r.date,S.settings.salary_history,S.settings.salary);
    const su=Number(r.salary_used||0);
    const youFromSu=+(su*pct/24).toFixed(2), cmiFromSu=+(su*em/24).toFixed(2);
    const matchesStoredSalary=Math.abs(Number(r.you)-youFromSu)<0.02&&Math.abs(Number(r.cmi)-cmiFromSu)<0.02;
    if(matchesStoredSalary&&su!==salTrue){
      r.salary_used=salTrue;
      r.you=+(salTrue*pct/24).toFixed(2);
      r.cmi=+(salTrue*em/24).toFixed(2);
    }
  }
}

function loadState(){
  try{ S=JSON.parse(localStorage.getItem(LS_KEY))||seedState(); }catch(_){ S=seedState(); }
  // Migrate: ensure hsa_cash and hsa_years exist
  if(S&&S.hsa){
    if(typeof S.hsa.hsa_cash==="undefined") S.hsa.hsa_cash=0;
    delete S.hsa.hsa_balance;
    delete S.hsa.hsa_limit;
  }
  if(S&&S.settings){
    if(!Array.isArray(S.settings.hsa_years)){
      S.settings.hsa_years=[
        {year:2025,self_annual:3700,employer_annual:300},
        {year:2026,self_annual:3792,employer_annual:600}
      ];
    }
  }
  // Migrate: remove any 401k entries that were confirmed on the 1st of a month
  // (old logic used 1st+15th, new logic uses 15th+last weekday of month)
  if(S&&S.k401&&Array.isArray(S.k401.contributions)){
    const before=S.k401.contributions.length;
    S.k401.contributions=S.k401.contributions.filter(r=>{
      // Remove entries auto-generated on the 1st of any month (old incorrect logic)
      const day=String(r.date||"").slice(8,10);
      if(day==="01") return false;
      // Remove the old single opening/cumulative entry
      if(r.opening===true) return false;
      return true;
    });
    if(S.k401.contributions.length!==before){
      console.log("Migrated: removed "+(before-S.k401.contributions.length)+" old 1st-of-month 401k entries");
    }
  }
  if(S&&S.k401&&Array.isArray(S.k401.contributions)) reconcile401kRowsFromHistory();
  saveState(false);
}
function saveState(render=true){ localStorage.setItem(LS_KEY, JSON.stringify(S)); if(render) doRender(); }
function fmt(n,dec=2){ return new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:dec,minimumFractionDigits:dec}).format(Number(n||0)); }
function pct(n,dec=1){ return `${Number(n||0).toFixed(dec)}%`; }
function glStr(gl,glPct){ const cls=gl>=0?"gain":"loss"; const sign=gl>=0?"+":""; return `<span class="${cls}">${sign}${fmt(gl)} · ${sign}${pct(glPct)}</span>`; }
function toast(msg){ const t=document.createElement("div"); t.className="toast"; t.textContent=msg; document.getElementById("toastHost").appendChild(t); setTimeout(()=>t.remove(),1900); }
function sum(arr,f){ return arr.reduce((a,b)=>a+(f?f(b):b),0); }
function d(v){ return new Date(v+"T12:00:00"); }
function today(){ return new Date(); }
function qEndInfo(date){
  const y=date.getFullYear(); const m=date.getMonth()+1; const day=date.getDate();
  if(m===3 && day>=25) return {q:1,end:`${y}-03-31`};
  if(m===6 && day>=24) return {q:2,end:`${y}-06-30`};
  if(m===9 && day>=24) return {q:3,end:`${y}-09-30`};
  if(m===12 && day>=25) return {q:4,end:`${y}-12-31`};
  return null;
}
function hasSnapshotInQuarter(y,q){
  const rng=[[1,3],[4,6],[7,9],[10,12]][q-1];
  return S.snapshots.some(s=>{ const dt=new Date(s.date+"T12:00:00"); return dt.getFullYear()===y && (dt.getMonth()+1)>=rng[0] && (dt.getMonth()+1)<=rng[1]; });
}

// Financial calculations
function computeHolding(h){
  const shares = sum(h.trades,t=>Number(t.qty));
  const cost = sum(h.trades,t=>Number(t.amount));
  const avg = shares ? cost/shares : 0;
  const value = shares * Number(h.current_price||0);
  const gl = value - cost;
  const glPct = cost ? (gl/cost)*100 : 0;
  return {...h,shares,cost,avg,value,gl,glPct};
}
function computeRobinhood(){
  const hs = S.robinhood.holdings.map(computeHolding);
  const invested = sum(hs,h=>h.cost);
  const value = sum(hs,h=>h.value);
  const gl = value - invested;
  const glPct=invested ? (gl/invested)*100 : 0;
  const worst = hs.map(h=>({ticker:h.ticker,p:(value? (h.value/value)*100:0)})).sort((a,b)=>b.p-a.p)[0];
  return {holdings:hs,invested,value,gl,glPct,count:hs.length,cash:Number(S.robinhood.cash||0),worst};
}
function compute401k(){
  const rows=[...S.k401.contributions].sort((a,b)=>d(a.date)-d(b.date));
  const you = sum(rows,r=>Number(r.you));
  const cmi = sum(rows,r=>Number(r.cmi));
  const invested = you+cmi;
  const value = Number(S.k401.current_value||0);
  const gl = value-invested;
  const glPct = invested ? (gl/invested)*100 : 0;
  // Match P/L: how much account value exceeds YOUR money only
  const contribGl = value-you;
  const contribGlPct = you ? (contribGl/you)*100 : 0;
  // Group by year
  const byYear={};
  rows.forEach(r=>{
    const yr=String(r.date||"").slice(0,4)||"Unknown";
    if(!byYear[yr]) byYear[yr]={year:yr,you:0,cmi:0};
    byYear[yr].you+=Number(r.you||0);
    byYear[yr].cmi+=Number(r.cmi||0);
  });
  const years=Object.values(byYear).sort((a,b)=>b.year.localeCompare(a.year));
  return {rows,you,cmi,invested,value,gl,glPct,contribGl,contribGlPct,years};
}
function computeHSA(){
  const rows=[...S.hsa.contributions];
  // HSA invested = auto sum of ALL contributions
  const you = sum(rows.filter(r=>r.type==="self"),r=>Number(r.amount));
  const employer = sum(rows.filter(r=>r.type==="employer"),r=>Number(r.amount));
  const invested = you + employer;
  // HSA total account value = HSA cash account + Charles Schwab brokerage
  const hsaCash = Number(S.hsa.hsa_cash||0);
  const schwabValue = Number(S.hsa.schwab_value||0);
  const totalValue = hsaCash + schwabValue;
  // P/L row 1: total account value vs all money invested
  const gl = totalValue - invested;
  const glPct = invested ? (gl/invested)*100 : 0;
  // P/L row 2: total account value vs YOUR money only (excludes employer)
  const contribGl = totalValue - you;
  const contribGlPct = you ? (contribGl/you)*100 : 0;
  // Group by year for yearly table
  const byYear={};
  rows.forEach(r=>{
    const yr=String(r.date||"").slice(0,4)||"Unknown";
    if(!byYear[yr]) byYear[yr]={year:yr,self:0,employer:0};
    if(r.type==="self") byYear[yr].self+=Number(r.amount||0);
    else byYear[yr].employer+=Number(r.amount||0);
  });
  const years=Object.values(byYear).sort((a,b)=>b.year.localeCompare(a.year));
  return {rows,you,employer,invested,totalValue,hsaCash,schwabValue,gl,glPct,contribGl,contribGlPct,years};
}

function studentTotalOwed(s){ return Number(s.balance)+Number(s.accrued_interest||0); }

function amortOneMonth(balance, annualRatePct, payment){
  const b=Math.max(0,Number(balance));
  const r=Number(annualRatePct)/100/12;
  const interest=b*r;
  const principal=payment-interest;
  const newBalance=b-principal;
  return {interest,principal,newBalance};
}

function simulateLoanPayoff(startBalance, annualRatePct, payment, maxMonths=12000){
  let b=Math.max(0,Number(startBalance));
  let months=0, totalInterestRemaining=0;
  while(b>0.015&&months<maxMonths){
    const {interest,principal,newBalance}=amortOneMonth(b,annualRatePct,payment);
    totalInterestRemaining+=interest;
    b=newBalance;
    months++;
  }
  return {months,totalInterestRemaining,balanceLeft:b,hopeless:b>0.015};
}

function interestOverNextNPayments(startBalance, annualRatePct, payment, n){
  let b=Math.max(0,Number(startBalance));
  let s=0;
  for(let i=0;i<n;i++){
    if(b<=0.005) break;
    const {interest,newBalance}=amortOneMonth(b,annualRatePct,payment);
    s+=interest;
    b=newBalance;
  }
  return s;
}

function payoffEtaLabel(monthsFromNow, hopeless){
  if(hopeless||!Number.isFinite(monthsFromNow)||monthsFromNow>8000) return "—";
  const dt=new Date();
  dt.setMonth(dt.getMonth()+Math.ceil(monthsFromNow));
  return dt.toLocaleString("en-US",{month:"short",year:"numeric"});
}

function balanceBeforeHistoricalPayment(loanKey, payDateStr){
  const ref=S.debt[loanKey];
  const cur=loanKey==="student"?studentTotalOwed(ref):Number(ref.balance);
  const later=S.debt.payment_history.filter(h=>
    h.loan===loanKey&&!h.missed&&typeof h.principal==="number"&&h.date&&d(h.date)>d(payDateStr)
  );
  return cur+sum(later,h=>Number(h.principal||0));
}

function splitPaymentOnBalance(balanceBefore, annualRatePct, paymentAmount){
  const b=Math.max(0,Number(balanceBefore));
  const r=Number(annualRatePct)/100/12;
  const interest=+(b*r).toFixed(2);
  const principal=+(paymentAmount-interest).toFixed(2);
  let newBal=+(b-principal).toFixed(2);
  if(newBal<0) newBal=0;
  return {interest,principal,newBalance:newBal};
}

function applyStudentPrincipalReduction(ref, principalPortion){
  let pp=Math.max(0,Number(principalPortion));
  let acc=Number(ref.accrued_interest||0), pb=Number(ref.balance);
  const red=Math.min(pp,acc+pb);
  let rem=red;
  if(rem>=acc){ ref.accrued_interest=0; ref.balance=Math.max(0,pb-(rem-acc)); }
  else ref.accrued_interest=acc-rem;
}

function computeDebt(){
  const car=S.debt.car, student=S.debt.student;
  const carBal=Number(car.balance);
  const stuOwed=studentTotalOwed(student);
  const total=carBal+stuOwed;
  const monthly=Number(car.payment)+Number(student.payment);
  const carSim=simulateLoanPayoff(carBal,car.rate,car.payment);
  const stuSim=simulateLoanPayoff(stuOwed,student.rate,student.payment);
  const annualInterest=interestOverNextNPayments(carBal,car.rate,car.payment,12)
    +interestOverNextNPayments(stuOwed,student.rate,student.payment,12);
  const nextCar=amortOneMonth(carBal,car.rate,car.payment);
  const nextStu=amortOneMonth(stuOwed,student.rate,student.payment);
  return{car,student,total,monthly,annualInterest,longest:Math.max(carSim.months,stuSim.months),carSim,stuSim,nextCar,nextStu,carBal,stuOwed};
}

function buildPayoffProjectionSeries(){
  const car=S.debt.car, student=S.debt.student;
  const carPts=[]; let b=Math.max(0,Number(car.balance));
  carPts.push(b);
  for(let guard=0;b>0.015&&guard<15000;guard++){
    b=amortOneMonth(b,car.rate,car.payment).newBalance;
    carPts.push(Math.max(0,b));
  }
  const stuPts=[]; b=Math.max(0,studentTotalOwed(student));
  stuPts.push(b);
  for(let guard=0;b>0.015&&guard<15000;guard++){
    b=amortOneMonth(b,student.rate,student.payment).newBalance;
    stuPts.push(Math.max(0,b));
  }
  const n=Math.max(carPts.length,stuPts.length);
  const carData=[], stuData=[];
  for(let i=0;i<n;i++){
    carData.push({x:i,y:i<carPts.length?carPts[i]:null});
    stuData.push({x:i,y:i<stuPts.length?stuPts[i]:null});
  }
  let carZeroMonth=null;
  const zi=carPts.findIndex(v=>v<=0.05);
  if(zi>=0) carZeroMonth=zi;
  return{carData,stuData,carZeroMonth,maxMonth:n-1};
}

function totalPortfolio(){
  const k=compute401k(), h=computeHSA(), r=computeRobinhood();
  const invested = k.invested+h.invested+r.invested;
  const value = k.value+h.totalValue+r.value+r.cash;
  return {k,h,r,invested,value,gl:value-invested,glPct:invested?(value-invested)/invested*100:0};
}

function pending401k(){
  const now=today(), y=now.getFullYear(), mo=now.getMonth()+1;
  // Paycheck 1: 15th or previous weekday
  const raw15=`${y}-${String(mo).padStart(2,"0")}-15`;
  const pay1=prevWeekday(raw15);
  // Paycheck 2: last day of month or previous weekday
  const pay2=prevWeekday(lastDayOfMonth(y,mo));
  const dates=[pay1,pay2].filter(x=>d(x)<=now);
  const p=S.settings.k401_pct/100, em=S.settings.employer_match_pct/100;
  return dates.filter(dt=>!S.k401.contributions.some(r=>r.date===dt)).map(dt=>{
    const salary=getSalaryForDate(dt);
    return {date:dt,you:+(salary*p/24).toFixed(2),cmi:+(salary*em/24).toFixed(2),salary_used:salary};
  });
}
function getSalaryForDate(dateStr){
  return salaryForDateFromHistory(dateStr,S.settings.salary_history,S.settings.salary);
}

// Return the nearest weekday on or before a given date (roll back Sat→Fri, Sun→Fri)
function prevWeekday(dateStr){
  const dt=new Date(dateStr+"T12:00:00");
  const day=dt.getDay(); // 0=Sun,6=Sat
  if(day===6) dt.setDate(dt.getDate()-1); // Sat→Fri
  else if(day===0) dt.setDate(dt.getDate()-2); // Sun→Fri
  return dt.toISOString().slice(0,10);
}
// Last day of a given year/month as YYYY-MM-DD
function lastDayOfMonth(y,m){
  return new Date(y, m, 0).toISOString().slice(0,10); // month is 1-based, day=0 gives last day of prior month
}
function pendingHsa(){
  const now=today();
  const y=now.getFullYear(), mo=now.getMonth()+1;
  // Paycheck 1: 15th or previous weekday
  const raw15=`${y}-${String(mo).padStart(2,"0")}-15`;
  const pay1=prevWeekday(raw15);
  // Paycheck 2: last day of month or previous weekday
  const rawLast=lastDayOfMonth(y,mo);
  const pay2=prevWeekday(rawLast);
  const dates=[pay1,pay2].filter(x=>d(x)<=now);
  // Get per-paycheck amount from hsa_years for current year, fall back to setting
  const curYearCfg=(S.settings.hsa_years||[]).find(y=>y.year===y);
  const yearCfg=(S.settings.hsa_years||[]).find(yy=>yy.year===now.getFullYear());
  const perPaycheck=yearCfg ? yearCfg.self_annual/24 : Number(S.settings.hsa_per_paycheck);
  return dates.filter(dt=>!S.hsa.contributions.some(r=>r.date===dt && r.type==="self"))
    .map(dt=>({date:dt,amount:+perPaycheck.toFixed(2)}));
}

async function refreshRobinhoodPrices(){
  if(typeof navigator!=="undefined"&&navigator.onLine===false){ toast("No internet connection"); return; }
  robinhoodPriceRefreshLoading=true;
  doRender();
  let anyFail=false;
  const holdings=S.robinhood.holdings||[];
  try{
    if(holdings.length){
      const results=await Promise.all(holdings.map(async (h)=>{
        const sym=String(h.ticker||"").trim();
        if(!sym) return {ok:false};
        const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=1d`;
        try{
          const res=await fetch(url,{method:"GET",mode:"cors",credentials:"omit",cache:"no-store",headers:{Accept:"application/json"}});
          if(!res.ok) throw new Error("http");
          const data=await res.json();
          if(data?.chart?.error) throw new Error("api");
          const p=data?.chart?.result?.[0]?.meta?.regularMarketPrice;
          if(typeof p!=="number"||!Number.isFinite(p)) throw new Error("bad");
          return {ok:true,id:h.id,price:p};
        }catch(_){ return {ok:false}; }
      }));
      for(const r of results){
        if(!r.ok){ anyFail=true; continue; }
        const ho=S.robinhood.holdings.find(x=>x.id===r.id);
        if(ho) ho.current_price=Number(r.price);
      }
    }
  }catch(_){ anyFail=true; }
  finally{ robinhoodPriceRefreshLoading=false; saveState(); }
  const ts=new Date().toLocaleTimeString();
  if(anyFail) toast("Some prices could not be updated — update manually");
  else toast(`Prices updated · ${ts}`);
}

function projectSeries(){
  const p=S.settings.proj; const currentAge=29, years=36, months=years*12;
  let val=Number(p.portfolio), mContrib=Number(p.monthly);
  const annual=Number(p.return_pct)/100, infl=Number(p.inflation)/100, cg=Number(p.contrib_growth)/100;
  const byAge=[];
  for(let m=1;m<=months;m++){
    val = val*(1+annual/12)+mContrib;
    if(m%12===0){ mContrib *= (1+cg); byAge.push({age:currentAge+m/12,nominal:val,real:val/Math.pow(1+infl,m/12)}); }
  }
  return byAge;
}
function milestoneAge(target){
  const p=S.settings.proj; let val=Number(p.portfolio), mContrib=Number(p.monthly), age=29, ym=0;
  const annual=p.return_pct/100, cg=p.contrib_growth/100;
  while(val<target && ym<900){ val=val*(1+annual/12)+mContrib; ym++; if(ym%12===0){mContrib*=(1+cg); age++;} }
  return {age,year:new Date().getFullYear()+(age-29)};
}

function drawCharts(){
  const p=totalPortfolio();
  if(document.getElementById("portfolioDonut")){
    makeChart("portfolioDonut",{type:"doughnut",data:{labels:["401k","HSA","Robinhood","Cash reserve"],datasets:[{data:[p.k.value,p.h.totalValue,p.r.value,p.r.cash],backgroundColor:["#3b82f6","#22c55e","#8b5cf6","#6b7280"],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"right",labels:{color:getComputedStyle(document.body).getPropertyValue("--text").trim()}}}}});
  }
  if(document.getElementById("nwLine")){
    makeChart("nwLine",{type:"line",data:{labels:S.snapshots.map(s=>s.date),datasets:[{data:S.snapshots.map(s=>s.value),borderColor:"#6366f1",backgroundColor:"rgba(99,102,241,.15)",fill:true,tension:.25,pointRadius:0}]},options:chartOpts()});
  }
  // HSA chart removed
  if(document.getElementById("futureLine")){
    const arr=projectSeries();
    makeChart("futureLine",{type:"line",data:{labels:arr.map(x=>x.age),datasets:[
      {label:"Nominal",data:arr.map(x=>x.nominal),borderColor:"#6366f1",backgroundColor:"rgba(99,102,241,.08)",fill:true,tension:.2,pointRadius:0},
      {label:"Real",data:arr.map(x=>x.real),borderColor:"#22c55e",borderDash:[7,5],fill:false,tension:.2,pointRadius:0}
    ]},options:{...chartOpts(),scales:{...chartOpts().scales,y:{...chartOpts().scales.y,ticks:{color:getComputedStyle(document.body).getPropertyValue("--muted").trim(),callback:(v)=>v>=1e6?`$${(v/1e6).toFixed(1)}M`:`$${Math.round(v/1000)}k`}}}}});
  }
  if(document.getElementById("debtPayoffChart")){
    const css=getComputedStyle(document.body);
    const txt=css.getPropertyValue("--text").trim();
    const muted=css.getPropertyValue("--muted").trim();
    const grid=css.getPropertyValue("--grid").trim();
    const {carData,stuData,carZeroMonth,maxMonth}=buildPayoffProjectionSeries();
    makeChart("debtPayoffChart",{
      type:"line",
      plugins:[{id:"carPayoffVLine",afterDraw(chart){
        const m=chart.config.options.carZeroMonth;
        if(m==null||!Number.isFinite(m)) return;
        const xScale=chart.scales.x;
        if(!xScale)return;
        const {top,bottom,left,right}=chart.chartArea;
        const px=xScale.getPixelForValue(m);
        if(!Number.isFinite(px)||px<left-2||px>right+2) return;
        const ctx=chart.ctx;
        ctx.save();ctx.strokeStyle="#3b82f6";ctx.globalAlpha=.75;ctx.setLineDash([6,5]);ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(px,top);ctx.lineTo(px,bottom);ctx.stroke();
        ctx.setLineDash([]);ctx.globalAlpha=1;ctx.font="11px DM Sans, sans-serif";ctx.fillStyle=muted;
        ctx.textAlign=m<maxMonth/2?"left":"right";
        const lx=m<maxMonth/2?Math.min(px+6,right-2):Math.max(px-6,left+2);
        ctx.fillText("Car paid off",lx,top+14);ctx.restore();
      }}],
      data:{datasets:[
        {label:"Car loan",data:carData,borderColor:"#3b82f6",backgroundColor:"rgba(59,130,246,0.06)",borderWidth:2,fill:false,tension:.12,spanGaps:false,pointRadius:0,pointHitRadius:0},
        {label:"Student loan",data:stuData,borderColor:"#8b5cf6",backgroundColor:"rgba(139,92,246,0.06)",borderWidth:2,fill:false,tension:.12,spanGaps:false,pointRadius:0,pointHitRadius:0}
      ]},
      options:{responsive:true,maintainAspectRatio:false,carZeroMonth,interaction:{mode:"index",intersect:false},
        plugins:{legend:{position:"top",labels:{color:txt}},tooltip:{callbacks:{
          title:(items)=>{ const x=items[0]?.parsed?.x; if(x==null)return""; const mo=Math.round(x); return mo===0?"Now":(mo%12===0?`${mo/12} yr`:`${mo} mo`); },
          label:(ctx)=>{ const y=ctx.parsed.y; if(y==null)return`${ctx.dataset.label}: —`; return` ${ctx.dataset.label}: ${fmt(y,0)}`; }
        }}},
        scales:{
          x:{type:"linear",min:0,suggestedMax:maxMonth+0.5,grid:{color:grid},ticks:{color:muted,maxTicksLimit:14,callback(v){ const m=Math.round(Number(v)); if(m===0)return"0"; if(m%12===0)return`${m/12}yr`; if(m%6===0)return`${m}mo`; return""; }}},
          y:{grid:{color:grid},ticks:{color:muted,maxTicksLimit:10,callback:(val)=>fmt(val,0)}}
        }
      }
    });
  }
}

function initIOSStandaloneFixes(){
  if(iosStandaloneTapInit) return;
  iosStandaloneTapInit=true;
  document.body.addEventListener("touchstart",function(){},{passive:true});
  let themeTouchMs=0, refreshTouchMs=0;
  function toggleThemeAction(){
    if(!S||!S.settings) return;
    S.settings.theme=S.settings.theme==="dark"?"light":"dark";
    saveState();
  }
  document.addEventListener("touchend",function(e){
    const toggleEl=e.target.closest("#themeToggle, #themeToggle2");
    if(toggleEl){ e.preventDefault(); themeTouchMs=Date.now(); toggleThemeAction(); return; }
    const refBtn=e.target.closest("#refreshRobinhoodPrices");
    if(refBtn){ if(refBtn.disabled||robinhoodPriceRefreshLoading) return; e.preventDefault(); refreshTouchMs=Date.now(); refreshRobinhoodPrices(); }
  },{passive:false,capture:true});
  document.addEventListener("click",function(e){
    const toggleEl=e.target.closest("#themeToggle, #themeToggle2");
    if(toggleEl){ if(Date.now()-themeTouchMs<450){ e.preventDefault(); e.stopPropagation(); return; } toggleThemeAction(); return; }
    const refBtn=e.target.closest("#refreshRobinhoodPrices");
    if(refBtn){ if(refBtn.disabled||robinhoodPriceRefreshLoading) return; if(Date.now()-refreshTouchMs<450){ e.preventDefault(); return; } refreshRobinhoodPrices(); }
  },{capture:true});
}

function wire(){
  const dT=document.getElementById("debtToggle"); if(dT) dT.onclick=()=>{S.settings.show_debt=!S.settings.show_debt; saveState();};
  document.querySelectorAll("[data-nav]").forEach(b=>b.onclick=()=>{TAB=b.dataset.nav; doRender();});
  document.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>{
    const id=b.dataset.open; const loan=b.dataset.loan;
    if(id==="extraPaymentModal"){document.getElementById("loanTarget").value=loan||"";}
    if(id==="editPaymentModal"){document.getElementById("editLoanTarget").value=loan||"";}
    if(id==="missedPaymentModal"){document.getElementById("missLoanTarget").value=loan||"";}
    if(id==="hsaCashModal"){ const h=document.getElementById("hsaCashVal"); if(h) h.value=String(S.hsa.hsa_cash||0); }
    if(id==="hsaSchwabModal"){ const h=document.getElementById("hsaSchwabVal"); if(h) h.value=String(S.hsa.schwab_value||0); }
    openModal(id);
  });
  document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>closeModal(b.dataset.close));
  document.querySelectorAll(".modal-wrap").forEach(m=>m.onclick=(e)=>{ if(e.target===m) m.classList.remove("show"); });
  document.querySelectorAll("[data-confirm401k]").forEach(b=>b.onclick=()=>{ const p=pending401k()[Number(b.dataset.confirm401k)]; if(!p) return; S.k401.contributions.push({id:Date.now(),date:p.date,you:+p.you.toFixed(2),cmi:+p.cmi.toFixed(2),note:"",locked:true,salary_used:p.salary_used}); saveState(); });
  document.querySelectorAll("[data-skip401k]").forEach(b=>b.onclick=()=>{ toast("Skipped."); b.closest(".card").remove(); });
  // Edit 401k entry
  document.querySelectorAll("[data-edit401k]").forEach(b=>b.onclick=()=>{
    const r=S.k401.contributions.find(x=>x.id==b.dataset.edit401k);
    if(!r) return;
    document.getElementById("editKId").value=r.id;
    document.getElementById("editKDate").value=r.date;
    document.getElementById("editKYou").value=r.you;
    document.getElementById("editKCmi").value=r.cmi;
    document.getElementById("editKNote").value=r.note||"";
    const sal=getSalaryForDate(r.date);
    document.getElementById("editKSalaryNote").textContent=`Salary for ${r.date}: ${new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(sal)}`;
    openModal("edit401kModal");
  });
  document.querySelectorAll("[data-del401k]").forEach(b=>b.onclick=()=>{
    if(confirm("Delete this contribution entry?")) {
      S.k401.contributions=S.k401.contributions.filter(x=>x.id!=b.dataset.del401k);
      saveState();
    }
  });
  document.querySelectorAll("[data-confirmhsa]").forEach(b=>b.onclick=()=>{
    const p=pendingHsa()[Number(b.dataset.confirmhsa)]; if(!p) return;
    S.hsa.contributions.push({id:Date.now(),date:p.date,amount:p.amount,type:"self",note:"",locked:true});
    saveState();
  });
  document.querySelectorAll("[data-skiphsa]").forEach(b=>b.onclick=()=>{ toast("Skipped."); b.closest(".card").remove(); });
  document.querySelectorAll("[data-lockhsa]").forEach(b=>b.onclick=()=>{ const r=S.hsa.contributions.find(x=>x.id==b.dataset.lockhsa); if(r) r.locked=!r.locked; saveState(); });
  document.querySelectorAll("[data-delhsa]").forEach(b=>b.onclick=()=>{
    if(confirm("Delete this contribution entry?")) {
      S.hsa.contributions=S.hsa.contributions.filter(x=>x.id!=b.dataset.delhsa);
      saveState();
    }
  });
  // Edit HSA entry
  document.querySelectorAll("[data-edithsa]").forEach(b=>b.onclick=()=>{
    const r=S.hsa.contributions.find(x=>x.id==b.dataset.edithsa);
    if(!r) return;
    document.getElementById("editHId").value=r.id;
    document.getElementById("editHDate").value=r.date;
    document.getElementById("editHAmt").value=r.amount;
    document.getElementById("editHType").value=r.type;
    document.getElementById("editHNote").value=r.note||"";
    openModal("editHsaEntryModal");
  });
  document.querySelectorAll("[data-expand]").forEach(r=>r.onclick=()=>document.getElementById(`trades-${r.dataset.expand}`).classList.toggle("hidden"));
  document.querySelectorAll("[data-openprice]").forEach(b=>b.onclick=(e)=>{ e.stopPropagation(); const h=S.robinhood.holdings.find(x=>x.id==b.dataset.openprice); if(!h) return; document.getElementById("priceTicker").value=h.ticker; document.getElementById("priceVal").value=h.current_price; openModal("priceModal"); });
  document.querySelectorAll("[data-delhold]").forEach(b=>b.onclick=()=>{ if(confirm("Delete entire position?")) { S.robinhood.holdings=S.robinhood.holdings.filter(h=>h.id!=b.dataset.delhold); saveState(); }});
  document.querySelectorAll("[data-chip]").forEach(b=>b.onclick=(ev)=>{
    ev.preventDefault();
    const inp=document.getElementById("tTicker");
    if(!inp) return;
    inp.value=b.dataset.chip||"";
    inp.focus();
  });
  document.querySelectorAll("[data-set]").forEach(b=>b.onclick=()=>{
    const key=b.dataset.set; document.getElementById("setKey").value=key;
    document.getElementById("setVal").value=key==="name"?S.profile.name:S.settings[key];
    const wrap=document.getElementById("setSalaryDateWrap");
    if(key==="salary"){ wrap.classList.remove("hidden"); document.getElementById("setSalaryEffective").value=S.settings.salary_date||""; }
    else wrap.classList.add("hidden");
    openModal("editSettingModal");
  });
  document.querySelectorAll("[data-editproj]").forEach(b=>b.onclick=()=>{
    document.getElementById("setKey").value="proj."+b.dataset.editproj;
    document.getElementById("setVal").value=S.settings.proj[b.dataset.editproj];
    document.getElementById("setSalaryDateWrap").classList.add("hidden");
    openModal("editSettingModal");
  });
  const salInline=document.getElementById("salaryEffectiveInline");
  if(salInline) salInline.onchange=()=>{
    const newD=salInline.value; if(!newD) return;
    const oldD=S.settings.salary_date; const cur=S.settings.salary;
    S.settings.salary_date=newD;
    const hist=[...S.settings.salary_history];
    let i=hist.findIndex(h=>h.salary===cur && h.date===oldD);
    if(i<0){ for(let j=hist.length-1;j>=0;j--) if(hist[j].salary===cur){ i=j; break; } }
    if(i>=0) hist[i]={...hist[i],date:newD};
    else hist.push({salary:cur,date:newD});
    S.settings.salary_history=hist;
    saveState(); toast("Effective date saved");
  };
  if(document.getElementById("exportBtn")) document.getElementById("exportBtn").onclick=exportJSON;

  document.getElementById("jsonImportInput").onchange=(e)=>{ const f=e.target.files[0]; if(!f) return; const fr=new FileReader(); fr.onload=()=>{ try{ S=JSON.parse(fr.result); if(S&&S.hsa){ if(typeof S.hsa.hsa_cash==="undefined") S.hsa.hsa_cash=0; delete S.hsa.hsa_balance; delete S.hsa.hsa_limit; } saveState(); toast("Imported."); }catch(_){ toast("Invalid JSON."); }}; fr.readAsText(f); };

  document.getElementById("saveTrade").onclick=()=>{
    const ticker=(document.getElementById("tTicker").value||"").toUpperCase().trim();
    const date=document.getElementById("tDate").value||new Date().toISOString().slice(0,10);
    let amount=Number(document.getElementById("tAmt").value||0), qty=Number(document.getElementById("tQty").value||0), price=Number(document.getElementById("tPrice").value||0);
    if(!amount&&qty&&price) amount=+(qty*price).toFixed(2);
    if(!qty&&amount&&price) qty=+(amount/price).toFixed(4);
    if(!price&&amount&&qty) price=+(amount/qty).toFixed(2);
    if(!ticker||!amount||!qty||!price) return toast("Fill ticker and at least two numeric values.");
    let h=S.robinhood.holdings.find(x=>x.ticker===ticker);
    if(!h){ h={id:Date.now(),ticker,name:ticker,trades:[],current_price:price}; S.robinhood.holdings.push(h); }
    h.trades.push({date,amount:+amount.toFixed(2),qty:+qty.toFixed(4),price:+price.toFixed(2)});
    h.current_price=price;
    closeAllModals(); saveState(); toast(`Trade added: ${ticker}`);
  };

  document.getElementById("savePrice").onclick=()=>{
    const t=document.getElementById("priceTicker").value;
    const v=Number(document.getElementById("priceVal").value);
    const h=S.robinhood.holdings.find(x=>x.ticker===t);
    if(h) h.current_price=v;
    closeAllModals(); saveState(); toast(`${t} price updated`);
  };

  document.getElementById("saveCash").onclick=()=>{ S.robinhood.cash=Number(document.getElementById("cashVal").value||0); closeAllModals(); saveState(); toast("Cash reserve updated"); };

  document.getElementById("saveK401Val").onclick=()=>{ S.k401.current_value=Number(document.getElementById("k401Val").value||0); closeAllModals(); saveState(); toast("401k value updated"); };

  document.getElementById("saveKEntry").onclick=()=>{
    const date=document.getElementById("kDate").value;
    const you=Number(document.getElementById("kYou").value||0);
    const cmi=Number(document.getElementById("kCmi").value||0);
    if(!date) return toast("Enter a date");
    S.k401.contributions.push({id:Date.now(),date,you,cmi,note:document.getElementById("kNote").value||"",locked:false,salary_used:getSalaryForDate(date)});
    closeAllModals(); saveState(); toast("Entry added");
  };
  document.getElementById("saveEdit401k").onclick=()=>{
    const id=Number(document.getElementById("editKId").value);
    const r=S.k401.contributions.find(x=>x.id===id);
    if(!r) return toast("Entry not found");
    const newDate=document.getElementById("editKDate").value||r.date;
    r.date=newDate;
    r.you=Number(document.getElementById("editKYou").value||r.you);
    r.cmi=Number(document.getElementById("editKCmi").value||r.cmi);
    r.note=document.getElementById("editKNote").value||"";
    // Recalculate salary_used from salary history based on new date
    r.salary_used=getSalaryForDate(newDate);
    closeAllModals(); saveState(); toast("Entry updated");
  };

  // HSA Balance edit (total contributed — stored independently)
  document.getElementById("saveHsaCash").onclick=()=>{
    const v=Number(document.getElementById("hsaCashVal").value||0);
    if(!Number.isFinite(v)||v<0) return toast("Enter a valid amount");
    S.hsa.hsa_cash=v;
    closeAllModals(); saveState(); toast("HSA cash balance updated");
  };

  // HSA Schwab value edit
  document.getElementById("saveHsaSchwab").onclick=()=>{
    const v=Number(document.getElementById("hsaSchwabVal").value||0);
    if(!Number.isFinite(v)||v<0) return toast("Enter a valid amount");
    S.hsa.schwab_value=v;
    S.hsa.schwab_history.push({date:new Date().toISOString().slice(0,10),value:v});
    closeAllModals(); saveState(); toast("Schwab value updated");
  };
  document.getElementById("saveEditHsa").onclick=()=>{
    const id=Number(document.getElementById("editHId").value);
    const r=S.hsa.contributions.find(x=>x.id===id);
    if(!r) return toast("Entry not found");
    r.date=document.getElementById("editHDate").value||r.date;
    r.amount=Number(document.getElementById("editHAmt").value||r.amount);
    r.type=document.getElementById("editHType").value;
    r.note=document.getElementById("editHNote").value||"";
    closeAllModals(); saveState(); toast("Entry updated");
  };

  // HSA year per-paycheck preview
  const hsaSelfInp=document.getElementById("hsaYearSelf");
  if(hsaSelfInp) hsaSelfInp.oninput=()=>{
    const v=Number(hsaSelfInp.value||0);
    const el=document.getElementById("hsaYearPerPaycheck");
    if(el) el.textContent=v>0?`Per paycheck: $${(v/24).toFixed(2)} × 24 paychecks`:"Per paycheck: —";
  };

  // Save HSA year
  document.getElementById("saveHsaYear").onclick=()=>{
    const yr=Number(document.getElementById("hsaYearNum").value);
    const self=Number(document.getElementById("hsaYearSelf").value||0);
    const emp=Number(document.getElementById("hsaYearEmp").value||0);
    if(!yr||yr<2020||yr>2040) return toast("Enter a valid year");
    if(self<=0) return toast("Enter your annual contribution");
    if(!S.settings.hsa_years) S.settings.hsa_years=[];
    const existing=S.settings.hsa_years.findIndex(y=>y.year===yr);
    if(existing>=0) S.settings.hsa_years[existing]={year:yr,self_annual:self,employer_annual:emp};
    else S.settings.hsa_years.push({year:yr,self_annual:self,employer_annual:emp});
    closeAllModals(); saveState(); toast(`HSA ${yr} saved — $${(self/24).toFixed(2)}/paycheck`);
  };

  // Edit HSA year — open modal pre-filled
  document.querySelectorAll("[data-edithsayear]").forEach(b=>b.onclick=()=>{
    const yr=Number(b.dataset.edithsayear);
    const cfg=(S.settings.hsa_years||[]).find(y=>y.year===yr);
    if(!cfg) return;
    document.getElementById("hsaYearNum").value=yr;
    document.getElementById("hsaYearSelf").value=cfg.self_annual;
    document.getElementById("hsaYearEmp").value=cfg.employer_annual;
    document.getElementById("hsaYearEditing").value=yr;
    const el=document.getElementById("hsaYearPerPaycheck");
    if(el) el.textContent=`Per paycheck: $${(cfg.self_annual/24).toFixed(2)} × 24 paychecks`;
    openModal("addHsaYearModal");
  });

  // Delete HSA year
  document.querySelectorAll("[data-delhsayear]").forEach(b=>b.onclick=()=>{
    const yr=Number(b.dataset.delhsayear);
    if(confirm(`Remove HSA configuration for ${yr}?`)){
      S.settings.hsa_years=(S.settings.hsa_years||[]).filter(y=>y.year!==yr);
      saveState(); toast(`${yr} removed`);
    }
  });

  document.getElementById("saveHEntry").onclick=()=>{
    const date=document.getElementById("hDate").value;
    const amount=Number(document.getElementById("hAmt").value||0);
    const type=document.getElementById("hType").value;
    if(!date||!amount) return toast("Enter date and amount");
    S.hsa.contributions.push({id:Date.now(),date,amount,type,note:document.getElementById("hNote").value||"",locked:false});
    closeAllModals(); saveState(); toast("HSA contribution added");
  };

  document.getElementById("saveSnap").onclick=()=>{
    const date=document.getElementById("snapDate").value||new Date().toISOString().slice(0,10);
    const value=Number(document.getElementById("snapVal").value||totalPortfolio().value);
    S.snapshots.push({date,value});
    closeAllModals(); saveState(); toast("Snapshot logged");
  };

  document.getElementById("saveExtraPayment").onclick=()=>{
    const loan=document.getElementById("loanTarget").value;
    const amt=Number(document.getElementById("loanAmt").value||0);
    const date=document.getElementById("loanDate").value||new Date().toISOString().slice(0,10);
    if(!amt||amt<=0) return toast("Enter a valid amount");
    const ref=S.debt[loan];
    const balBefore=loan==="student"?studentTotalOwed(ref):Number(ref.balance);
    const split=splitPaymentOnBalance(balBefore,ref.rate,amt);
    if(loan==="car"){ ref.balance=Math.max(0,split.newBalance); }
    else{ const red=+(balBefore-split.newBalance).toFixed(2); if(red>0.005) applyStudentPrincipalReduction(ref,red); }
    const after=loan==="student"?studentTotalOwed(ref):ref.balance;
    S.debt.payment_history.push({date,loan,amount:amt,principal:split.principal,interest:split.interest,balance_after:after,note:document.getElementById("loanNote").value||""});
    closeAllModals(); saveState(); toast("Extra payment logged");
  };

  document.getElementById("saveEditPayment").onclick=()=>{
    const loan=document.getElementById("editLoanTarget").value;
    const row=[...S.debt.payment_history].sort((a,b)=>d(b.date)-d(a.date)).find(x=>x.loan===loan&&!x.missed);
    if(!row) return toast("No payment found to edit");
    row.date=document.getElementById("editPayDate").value||row.date;
    const newAmt=Number(document.getElementById("editPayAmt").value);
    if(newAmt>0) row.amount=newAmt;
    const bb=balanceBeforeHistoricalPayment(loan,row.date);
    const split=splitPaymentOnBalance(bb,S.debt[loan].rate,row.amount);
    row.interest=split.interest; row.principal=split.principal; row.balance_after=split.newBalance;
    closeAllModals(); saveState(); toast("Payment updated");
  };

  document.getElementById("saveMissed").onclick=()=>{
    S.debt.payment_history.push({date:document.getElementById("missDate").value||new Date().toISOString().slice(0,10),loan:document.getElementById("missLoanTarget").value,amount:0,principal:0,interest:0,balance_after:"-",missed:true,note:document.getElementById("missNote").value||""});
    closeAllModals(); saveState(); toast("Missed payment logged");
  };

  document.getElementById("saveSetting").onclick=()=>{
    const key=document.getElementById("setKey").value, v=document.getElementById("setVal").value;
    if(key==="name"){ S.profile.name=v; }
    else if(key.startsWith("proj.")){ S.settings.proj[key.split(".")[1]]=Number(v); }
    else if(key==="salary"){
      const nv=Number(v);
      const eff=(document.getElementById("setSalaryEffective").value||"").trim();
      if(!eff) return toast("Choose an effective date");
      if(!Number.isFinite(nv)||nv<=0) return toast("Enter a valid salary");
      S.settings.salary=nv; S.settings.salary_date=eff;
      S.settings.salary_history.push({salary:nv,date:eff});
    }else{ S.settings[key]=isNaN(Number(v))?v:Number(v); }
    closeAllModals(); saveState(); toast("Setting saved");
  };

  document.getElementById("doClear").onclick=()=>{
    if((document.getElementById("confirmWord").value||"").trim()==="CONFIRM"){
      localStorage.removeItem(LS_KEY);
      S=seedState();
      saveState();
      closeAllModals();
      toast("Data reset to defaults.");
    } else { toast("Type CONFIRM to clear"); }
  };
}

function exportJSON(){
  const stamp=new Date().toISOString().slice(0,10);
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download=`neel-portfolio-${stamp}.json`; a.click();
  URL.revokeObjectURL(a.href);
}

// Init
buildModals();
loadState();
initIOSStandaloneFixes();
switchTheme();
doRender();
</script>
</body>
</html>
